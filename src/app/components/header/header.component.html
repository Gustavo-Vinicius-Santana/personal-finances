<header class="w-full bg-gray-900 text-gray-100 shadow-md">
  <div class="mx-auto flex  items-center justify-between px-6 py-4">
    
    <h1 class="text-base sm:text-lg md:text-xl font-semibold tracking-wide">
      Personal Finances
    </h1>

    <div class="flex items-center gap-3">

      @if (isLoggedIn()) {

        <h1>bem-vindo {{ name }}</h1>
        <button 
          class="cursor-pointer"
          [matMenuTriggerFor]="menu"
        >
          <mat-icon
            style="font-size: 37px; width: auto; height: auto; padding: 0%; margin: 0%;"
            fontIcon="account_circle" 
          />
        </button>
        
        <mat-menu 
          #menu="matMenu" 
        >
          <button mat-menu-item (click)="goToProfile()">
            <mat-icon fontIcon="person" />
            <span>Perfil</span>
          </button>

          <button mat-menu-item (click)="logout()">
            <mat-icon fontIcon="logout" />
            <span>Sair</span>
          </button>
        </mat-menu>

      } @else {

        <button 
          (click)="goToLogin()"
          class="rounded bg-blue-600 px-4 py-2 text-sm font-medium hover:bg-blue-700 transition">
          Login
        </button>

        <button 
          (click)="goToRegister()"
          class="rounded bg-gray-700 px-4 py-2 text-sm font-medium hover:bg-gray-600 transition">
          Cadastre-se
        </button>

      }

    </div>
  </div>
</header>
