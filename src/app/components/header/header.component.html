<header class="w-full bg-gray-900 text-gray-100 shadow-md">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
    <h1 class="text-xl font-bold tracking-wide">
      Personal Finances
    </h1>

    @switch (isLogado) {
      @case (true) {
        <span class="text-sm text-gray-300">
          Bem-vindo, <strong class="text-white">{{ usuario }}</strong>
        </span>
      }

      @default {
        <span class="text-sm text-gray-400">
          Não autenticado
        </span>
      }
    }
  </div>
</header>
