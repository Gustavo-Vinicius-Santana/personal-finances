<div class="flex justify-between items-center">
    <h2 class="text-xl font-semibold mb-4">Gastos</h2>
    <app-button-add 
        label="Despesa"
        typeFormAdd="expense"
    />
</div>

@for (expense of finance.expenses(); track expense.id) {
    <div class="flex justify-between py-2 border-b border-gray-700">
        <span>{{ expense.description }}</span>
        <span class="text-red-400">
            - {{ expense.amount | currency:'BRL':'symbol':'1.2-2':'pt-BR' }}
        </span>
    </div>
}

<h3 class="text-right">Total: {{ finance.totalExpense() | currency:'BRL':'symbol':'1.2-2':'pt-BR' }}</h3>
