<div class="min-h-screen flex items-center justify-center bg-gray-950 px-4">

  <div class="w-full max-w-md mx-auto rounded-2xl border border-gray-800 bg-gray-900/60 p-8 shadow-lg">
    
    <div class="flex flex-col gap-6">

      <div class="text-center">
        <h2 class="text-2xl font-semibold text-white">
          Alterar Senha
        </h2>
        <p class="text-sm text-gray-400 mt-1">
          Digite o código recebido e sua nova senha
        </p>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-sm font-medium text-gray-300">
          Código de verificação
        </label>

        <div class="flex flex-col gap-3 w-full">

          <div class="flex gap-3 w-full">

            <input
              type="text"
              [formControl]="code"
              placeholder="Digite o código"
              class="flex-1 rounded-xl bg-gray-800 border border-gray-700 px-4 py-2 text-white 
                    placeholder-gray-500 focus:outline-none focus:ring-2 
                    focus:ring-blue-500 focus:border-transparent transition"
            />

            <button
              type="button"
              class="min-w-[140px] rounded-xl bg-blue-600 hover:bg-blue-500 
                    px-4 py-2 font-medium text-white transition 
                    disabled:opacity-50 disabled:cursor-not-allowed"
              (click)="sendCode()"
              [disabled]="countdown > 0"
            >
              @if (countdown > 0) {
                Reenviar {{ countdown }}s
              } @else {
                Enviar código
              }
            </button>

          </div>

          @if (code.touched && code.invalid) {
            <span class="text-xs text-red-400">
              Código inválido (mínimo 6 caracteres)
            </span>
          }

        </div>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-sm font-medium text-gray-300">
          Nova Senha
        </label>
        <input
          type="password"
          [formControl]="newPassword"
          placeholder="Digite a nova senha"
          class="rounded-xl bg-gray-800 border border-gray-700 px-4 py-2 text-white 
                 placeholder-gray-500 focus:outline-none focus:ring-2 
                 focus:ring-blue-500 focus:border-transparent transition"
        />
        @if (newPassword.touched && newPassword.invalid) {
          <span class="text-xs text-red-400">
            A senha deve ter no mínimo 6 caracteres
          </span>
        }
      </div>

      <div class="flex flex-col gap-3 pt-2">

        <button
          (click)="changePassword()"
          type="button"
          [disabled]="code.invalid || newPassword.invalid"
          class="w-full rounded-xl bg-blue-600 hover:bg-blue-700 px-6 py-2 font-medium text-white 
                 transition active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Confirmar alteração
        </button>

        <button
          type="button"
          class="w-full rounded-xl bg-gray-800 border border-gray-700 hover:bg-gray-700 
                 px-6 py-2 font-medium text-gray-300 transition"
          (click)="goBack()"
        >
          Voltar
        </button>

      </div>

    </div>

  </div>

</div>
