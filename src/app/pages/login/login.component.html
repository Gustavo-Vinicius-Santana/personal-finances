<div class="min-h-screen flex items-center justify-center bg-gray-950 px-4">

  <div class="w-full max-w-md mx-auto rounded-2xl border border-gray-800 bg-gray-900/60 p-8 shadow-lg">
    
    <form class="flex flex-col gap-6" (ngSubmit)="handleSubmitLogin()">

      <div class="text-center">
        <h2 class="text-2xl font-semibold text-white">
          Login
        </h2>
        <p class="text-sm text-gray-400 mt-1">
          Acesse sua conta para continuar
        </p>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-sm font-medium text-gray-300">
          Email
        </label>
        <input
          type="email"
          [formControl]="email"
          placeholder="seu@email.com"
          class="rounded-xl bg-gray-800 border border-gray-700 px-4 py-2 text-white 
                 placeholder-gray-500 focus:outline-none focus:ring-2 
                 focus:ring-blue-500 focus:border-transparent transition"
        />
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-sm font-medium text-gray-300">
          Senha
        </label>
        <input
          type="password"
          [formControl]="password"
          placeholder="********"
          class="rounded-xl bg-gray-800 border border-gray-700 px-4 py-2 text-white 
                 placeholder-gray-500 focus:outline-none focus:ring-2 
                 focus:ring-blue-500 focus:border-transparent transition"
        />
      </div>

      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center gap-2 text-gray-400">
          <input [formControl]="remember" type="checkbox" class="accent-blue-600">
          Lembrar de mim
        </label>

        <a [routerLink]="['recover-account']" class="text-blue-400 hover:text-blue-500 transition">
          Esqueci a senha
        </a>
      </div>

      <button
        type="submit"
        class="w-full rounded-xl bg-blue-600 hover:bg-blue-700 px-6 py-2 font-medium text-white 
               transition active:scale-95"
      >
        Entrar
      </button>

    </form>

    <div class="text-center mt-6">
      <p class="text-sm text-gray-400">
        Não tem uma conta? 
        <a [routerLink]="['register']" class="text-blue-400 hover:text-blue-500 transition cursor-pointer">
          Registre-se
        </a>
      </p>
    </div>

  </div>

</div>
