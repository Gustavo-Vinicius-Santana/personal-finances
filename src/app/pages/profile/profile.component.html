<div class="min-h-screen flex items-center justify-center bg-gray-950 px-4">

  <div class="w-full max-w-md mx-auto rounded-2xl border border-gray-800 bg-gray-900/60 p-8 shadow-lg">
    
    <form class="flex flex-col gap-6">

      <!-- Título -->
      <div class="text-center">
        <h2 class="text-2xl font-semibold text-white">
          Meu Perfil
        </h2>
        <p class="text-sm text-gray-400 mt-1">
          Atualize suas informações
        </p>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-sm font-medium text-gray-300">
          Nome
        </label>
        <input
          type="text"
          [formControl]="name"
          placeholder="Seu nome completo"
          class="rounded-xl bg-gray-800 border border-gray-700 px-4 py-2 text-white 
                 placeholder-gray-500 focus:outline-none focus:ring-2 
                 focus:ring-blue-500 focus:border-transparent transition"
        />
      </div>

      <!-- Email -->
      <div class="flex flex-col gap-2">
        <label class="text-sm font-medium text-gray-300">
          Email
        </label>
        <input
          type="email"
          [formControl]="email"
          placeholder="seu@email.com"
          class="rounded-xl bg-gray-800 border border-gray-700 px-4 py-2 text-white 
                 placeholder-gray-500 focus:outline-none focus:ring-2 
                 focus:ring-blue-500 focus:border-transparent transition"
        />
      </div>

      <!-- Botões -->
      <div class="flex flex-col gap-3 pt-2">

        <button
          type="submit"
          class="w-full rounded-xl bg-blue-600 hover:bg-blue-700 px-6 py-2 font-medium text-white 
                 transition active:scale-95"
        >
          Salvar Alterações
        </button>

        <button
          type="button"
          class="w-full rounded-xl bg-gray-800 border border-gray-700 hover:bg-gray-700 
                 px-6 py-2 font-medium text-gray-300 transition"
        >
          Mudar Senha
        </button>

        <button
          type="button"
          class="w-full rounded-xl bg-gray-800 border border-gray-700 hover:bg-gray-700 
                 px-6 py-2 font-medium text-gray-300 transition"
          (click)="goBack()"
        >
          Voltar
        </button>

      </div>

    </form>

  </div>

</div>
